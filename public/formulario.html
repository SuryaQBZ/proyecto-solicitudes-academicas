<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar Solicitud Académica</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="containerFormulario">
  <h1 id="tituloFormulario">Ingresar Solicitud Académica</h1>
  <section class="card">
    <form id="formSolicitud">
      <div class="grupo">
        <label for="nombreEstudiante">Nombre del estudiante</label>
        <input type="text" id="nombreEstudiante" name="nombreEstudiante" placeholder="Ingrese nombre">
      </div>
      <div class="grupo">
        <label for="correo">Correo institucional</label>
        <input type="email" id="correo" name="correo" placeholder="Ingrese correo">
      </div>
      <div class="grupo">
        <label for="asignatura">Asignatura</label>
        <input type="text" id="asignatura" name="asignatura" placeholder="Ingrese asignatura">
      </div>
      <div class="grupo">
        <label for="tipo">Tipo de solicitud</label>
        <select id="tipo"name="tipo">
          <option value="">Seleccione una opción</option>
          <option value="Evaluacion">Evaluación</option>
          <option value="Asistencia">Asistencia</option>
          <option value="Contenidos">Contenidos</option>
          <option value="Plataforma">Plataforma</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="grupo">
        <label for="descripcion">Descripción de la solicitud</label>
        <textarea id="descripcion" name="descripcion" rows="5"></textarea>
      </div>
      <div class="grupo">
        <label for="prioridad">Prioridad</label>
        <select id="prioridad" name="prioridad">
          <option value="">Seleccione prioridad</option>
          <option value="Baja">Baja</option>
          <option value="Media">Media</option>
          <option value="Alta">Alta</option>
        </select>
      </div>
      <div class="barra-superior">
        <button type="submit" id="btnGuardar">Guardar solicitud</button>
        <button type="button" id="btnVolver" class="btn-secundario">Volver al listado</button>
      </div>
    </form>
    <div id="mensaje"></div>
  </section>
</div>
<script src="js/formulario.js"></script>
</body>
</html>
